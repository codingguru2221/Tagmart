kind = "web"
previewPath = "/"
title = "Tagmart Super Market"
version = "1.0.0"
id = "artifacts/tagmart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24966

[services.development]
run = "pnpm --filter @workspace/tagmart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tagmart", "run", "build" ]
publicDir = "artifacts/tagmart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24966"
BASE_PATH = "/"
